<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення — Фінальний крок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container checkout-container">
            <div class="checkout-form">
                <h2>Оформлення доставки</h2>
                <div class="input-group">
                    <input type="text" placeholder="Адреса доставки">
                </div>
                <div class="input-group">
                    <select>
                        <option>Спосіб оплати: готівка при отриманні</option>
                        <option>Оплата карткою</option>
                    </select>
                </div>
                <button class="buy-btn">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>
            </div>

            <div class="order-summary">
                <h3>Твоє замовлення:</h3>
                <div class="item-line"><span>Кирка</span> <span>1488 ₴</span></div>
                <div class="item-line"><span>Ключ на 12</span> <span>500 ₴</span></div>
                <hr>
                <div class="total">Разом: 2000 ₴</div>
            </div>
        </div>
    </div>
</body>
</html>
