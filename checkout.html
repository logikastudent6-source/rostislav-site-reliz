<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление — Финишная прямая</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container checkout-container">
            <div class="checkout-form">
                <h2>Оформление доставки</h2>
                <div class="input-group">
                    <input type="text" placeholder="Адрес доставки (не дефолтный)">
                </div>
                <div class="input-group">
                    <select>
                        <option>Способ оплаты: Нал Титану Спикер Мену</option>
                        <option>Картой (Luxury вариант)</option>
                    </select>
                </div>
                <button class="buy-btn">ПОДТВЕРДИТЬ И ЧИЛЛИТЬ</button>
            </div>

            <div class="order-summary">
                <h3>Твой Заказ:</h3>
                <div class="item-line"><span>Киркаркорав</span> <span>1488 &.</span></div>
                <div class="item-line"><span>Ключ на 12</span> <span>500 $.</span></div>
                <hr>
                <div class="total">Итого: 2000 $.</div>
            </div>
        </div>
    </div>
</body>
</html>
