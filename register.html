<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до команди — Інструменти</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-page">
        <div class="form-container">
            <h2>Реєстрація майстра</h2>
            <form>
                <div class="input-group">
                    <label>Твоє ім’я (або нік)</label>
                    <input type="text" placeholder="Введіть ім’я..." required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="********" required>
                </div>
                <button type="submit" class="buy-btn">ЗАРЕЄСТРУВАТИСЯ</button>
            </form>
            <p class="form-footer">Вже маєш акаунт? <a href="#">Увійти</a></p>
        </div>
    </div>
</body>
</html>
