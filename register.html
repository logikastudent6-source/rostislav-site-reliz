<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Сквад — Инструменты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-page">
        <div class="form-container">
            <h2>Регистрация Мастера</h2>
            <form>
                <div class="input-group">
                    <label>Твое Имя (или Ник)</label>
                    <input type="text" placeholder="Введите имя..." required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="sigma@mail.ru" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="********" required>
                </div>
                <button type="submit" class="buy-btn">ПРИШИТЬСЯ К КОРПУСУ</button>
            </form>
            <p class="form-footer">Уже в скваде? <a href="#">Войти</a></p>
        </div>
    </div>
</body>
</html>
